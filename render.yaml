services:
  - type: web
    name: flat4b-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 4000
    disk:
      name: sqlite-data
      mountPath: /app/backend/data
      sizeGB: 1

  - type: web
    name: flat4b-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE
        value: https://flat4b-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
